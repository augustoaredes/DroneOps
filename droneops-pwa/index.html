  <title>DroneWeather — Flight Condition Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0c10;--surface:#111318;--surface2:#181c23;--border:#1e2530;
      --accent:#00d4ff;--accent2:#0077ff;--warn:#ffaa00;--danger:#ff4444;--ok:#00e676;
      --text:#e8eaf0;--muted:#5a6070;--font:'Syne',sans-serif;--mono:'Space Mono',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font)}
    body{overflow-x:hidden;-webkit-font-smoothing:antialiased}
    .app{max-width:480px;margin:0 auto;padding:env(safe-area-inset-top, 1.5rem) 1rem calc(env(safe-area-inset-bottom, 0px) + 3rem)}
    .header{text-align:center;padding:1.5rem 0 1rem}
    .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
    .drone-icon{width:36px;height:36px}
    .app-title{font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
    .app-sub{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;font-family:var(--mono)}
    .section{margin-bottom:1.25rem}
    .label{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono);margin-bottom:8px;display:block}
    .select-wrap{position:relative}
    select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;padding:12px 16px;border-radius:8px;appearance:none;-webkit-appearance:none;cursor:pointer;transition:border .2s}
    select:focus{outline:none;border-color:var(--accent)}
    .select-arrow{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:10px}
    .loc-tabs{display:flex;gap:8px;margin-bottom:10px}
    .tab{flex:1;padding:9px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;border-radius:6px;cursor:pointer;transition:all .2s;text-align:center;letter-spacing:1px}
    .tab.active{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
    input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;padding:12px 16px;border-radius:8px;transition:border .2s;-webkit-appearance:none}
    input[type=text]:focus{outline:none;border-color:var(--accent)}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:8px;color:#000;font-family:var(--font);font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-top:4px;-webkit-tap-highlight-color:transparent}
    .btn:hover{opacity:.85}
    .btn:active{opacity:.7}
    .btn:disabled{opacity:.4;cursor:not-allowed}

    const label=i===0?'Hoje':i===1?'Amanhã':DIAS[d.getDay()];
    const num=String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
    const pill=document.createElement('button');
    pill.dataset.date=iso;
    pill.innerHTML=`<span style="font-size:10px;opacity:.7;letter-spacing:.5px">${label}</span><br><span style="font-size:15px;font-weight:700">${num}</span>`;
    pill.style.cssText='flex-shrink:0;min-width:62px;padding:8px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--mono);text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;line-height:1.4';
    pill.onclick=()=>selectDay(iso);
    strip.appendChild(pill);
    if(i===0) selectDay(iso);
  }
}

let suggestTimer=null;
let suggestions=[];
let suggestIdx=-1;
function onCityInput(){
  clearTimeout(suggestTimer);
  const q=document.getElementById('cityInput').value.trim();
  if(q.length<3){hideSuggestions();return;}
  suggestTimer=setTimeout(()=>fetchSuggestions(q),350);
}
async function fetchSuggestions(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1&accept-language=pt-BR`);
    const data=await r.json();
    suggestions=data;
    suggestIdx=-1;
    const list=document.getElementById('suggestList');
    if(!data.length){hideSuggestions();return;}
    list.innerHTML=data.map((loc,i)=>{
      const addr=loc.address;
      const bairro=addr.suburb||addr.neighbourhood||addr.quarter||addr.village||addr.town||'';
      const cidade=addr.city||addr.municipality||addr.county||'';
      const estado=addr.state_district||addr.state||'';
      const main=[bairro,cidade].filter(Boolean).join(', ')||loc.display_name.split(',')[0];
      const sub=[estado,addr.country].filter(Boolean).join(', ');
      return`<div class="suggest-item" data-idx="${i}" onmousedown="selectSuggestion(${i})">
        <div>${main}</div>
        <div class="suggest-sub">${sub}</div>
      </div>`;
    }).join('');
    list.style.display='block';
  }catch{}
}
function selectSuggestion(i){
  const loc=suggestions[i];
  if(!loc)return;
  const addr=loc.address;
  const bairro=addr.suburb||addr.neighbourhood||addr.quarter||addr.village||addr.town||'';
  const cidade=addr.city||addr.municipality||addr.county||'';
  const estado=addr.state_district||addr.state||'';
  const locName=[bairro,cidade,estado].filter(Boolean).join(', ')||loc.display_name.split(',').slice(0,2).join(',');
  document.getElementById('cityInput').value=locName;
  coords={lat:parseFloat(loc.lat),lon:parseFloat(loc.lon),name:locName};
  hideSuggestions();
}
function hideSuggestions(){
  document.getElementById('suggestList').style.display='none';
}
function onCityKey(e){
  const items=document.querySelectorAll('.suggest-item');
  if(e.key==='ArrowDown'){suggestIdx=Math.min(suggestIdx+1,items.length-1);highlightSuggest(items);}
  else if(e.key==='ArrowUp'){suggestIdx=Math.max(suggestIdx-1,0);highlightSuggest(items);}
  else if(e.key==='Enter'&&suggestIdx>=0){e.preventDefault();selectSuggestion(suggestIdx);}
  else if(e.key==='Escape'){hideSuggestions();}
}
function highlightSuggest(items){
  items.forEach((el,i)=>el.classList.toggle('active',i===suggestIdx));
}
document.addEventListener('click',e=>{if(!e.target.closest('.suggest-box'))hideSuggestions();});
async function fetchKp(){
  try{
    const r=await fetch('https://services.swpc.noaa.gov/json/planetary_k_index_1m.json');
    const d=await r.json();
    if(d&&d.length){
      const last=d[d.length-1];
      return parseFloat(last.kp_index||last.Kp||0);
    }
  }catch{}
  return null;
}
function kpStatus(kp){
  if(kp===null)return{label:'N/D',color:'var(--muted)',chip:'chip-warn',text:'Dados indisponíveis'};
  if(kp<=3)return{label:kp.toFixed(1),color:'var(--ok)',chip:'chip-ok',text:'Atividade geomagnética baixa — GPS estável'};
  if(kp<=4)return{label:kp.toFixed(1),color:'#80ff80',chip:'chip-ok',text:'Atividade moderada — monitorar o sinal GPS'};
  if(kp<=5)return{label:kp.toFixed(1),color:'var(--warn)',chip:'chip-warn',text:'Tempestade geomagnética leve — possível degradação do GPS'};
  if(kp<=6)return{label:kp.toFixed(1),color:'var(--warn)',chip:'chip-warn',text:'Tempestade moderada — evitar voos dependentes de GPS'};
  return{label:kp.toFixed(1),color:'var(--danger)',chip:'chip-bad',text:'Tempestade severa (Kp '+kp.toFixed(0)+') — NÃO VOAR com GPS'};
}
async function checkWeather(){
  const btn=document.getElementById('checkBtn');
  const res=document.getElementById('result');
  const droneId=document.getElementById('droneSelect').value;
  const drone={...DRONES[droneId],...customDrones[droneId]};
  if(!drone){res.innerHTML='<div class="error-msg">Selecione um drone válido.</div>';return;}

  const today=new Date().toISOString().split('T')[0];
  const isFuture=selectedDate && selectedDate!==today;

  // Resolver localização
  if(locMode==='gps'){
    if(!coords){res.innerHTML='<div class="error-msg">Clique em "Usar minha localização" primeiro.</div>';return;}
  } else {
    const city=document.getElementById('cityInput').value.trim();
    if(!city){res.innerHTML='<div class="error-msg">Digite o bairro ou cidade.</div>';return;}
    if(!coords||!coords.name){
      try{
        const geo=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1&addressdetails=1&accept-language=pt-BR`,{headers:{'Accept-Language':'pt-BR'}});
        const gd=await geo.json();
        if(!gd.length){res.innerHTML='<div class="error-msg">Local não encontrado. Tente: "Botafogo, RJ" ou "Botafogo, Rio de Janeiro".</div>';return;}
        const loc=gd[0],addr=loc.address;
        const bairro=addr.suburb||addr.neighbourhood||addr.quarter||addr.village||addr.town||'';
        const cidade=addr.city||addr.municipality||addr.county||'';
        const estado=addr.state_district||addr.state||'';
        const locName=[bairro,cidade,estado].filter(Boolean).join(', ')||loc.display_name.split(',').slice(0,2).join(',');
        coords={lat:parseFloat(loc.lat),lon:parseFloat(loc.lon),name:locName};
      }catch{res.innerHTML='<div class="error-msg">Erro ao buscar localização. Tente novamente.</div>';return;}
    }
  }

  btn.disabled=true;
  res.innerHTML=`<div class="loading pulse">${isFuture?'Buscando previsão...':'Consultando condições meteorológicas...'}</div>`;

  try{
    let wind,gust,temp,rain,cloud,vis,humid,weatherCode,windDir,uvIndex,kpVal=null;

    if(isFuture){
      // Previsão: busca horária, pega hora do meio-dia (12h) do dia selecionado
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&hourly=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_gusts_10m,wind_direction_10m,uv_index,cloud_cover,visibility,weather_code&wind_speed_unit=ms&timezone=auto&forecast_days=16`;
      const r=await fetch(url);
      const d=await r.json();
      // Preferir 12h, senão hora mais próxima do meio-dia disponível
      const hours=d.hourly.time.map((t,i)=>({t,i,h:parseInt(t.slice(11,13))})).filter(x=>x.t.startsWith(selectedDate));
      if(!hours.length){res.innerHTML='<div class="error-msg">Sem dados para esta data.</div>';btn.disabled=false;return;}
      const best=hours.reduce((a,b)=>Math.abs(a.h-12)<Math.abs(b.h-12)?a:b);
      const i=best.i;
      wind=d.hourly.wind_speed_10m[i];
      gust=d.hourly.wind_gusts_10m[i];
      temp=d.hourly.temperature_2m[i];
      rain=d.hourly.precipitation[i];
      cloud=d.hourly.cloud_cover[i];
      vis=d.hourly.visibility[i];
      humid=d.hourly.relative_humidity_2m[i];
      weatherCode=d.hourly.weather_code[i];

    } else {
      // Hoje: tempo real
      const url=`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current=temperature_2m,relative_humidity_2m,precipitation,wind_speed_10m,wind_gusts_10m,wind_direction_10m,uv_index,cloud_cover,visibility,weather_code&wind_speed_unit=ms&timezone=auto`;
      const [r,kp]=await Promise.all([fetch(url),fetchKp()]);
      const d=await r.json();
      const c=d.current;
      wind=c.wind_speed_10m; gust=c.wind_gusts_10m; temp=c.temperature_2m;
      rain=c.precipitation; cloud=c.cloud_cover; vis=c.visibility;
      humid=c.relative_humidity_2m; weatherCode=c.weather_code; kpVal=kp;
      windDir=c.wind_direction_10m; uvIndex=c.uv_index;
    }

    const issues=[];
    const warns=[];
    if(wind>drone.maxWind) issues.push('Vento acima do limite ('+(wind*3.6).toFixed(1)+' km/h > '+(drone.maxWind*3.6).toFixed(1)+' km/h)');
    else if(wind>drone.maxWind*0.8) warns.push('Vento próximo ao limite');
    if(gust>drone.maxWind*0.8) issues.push('Rajadas muito fortes ('+(gust*3.6).toFixed(1)+' km/h) — próximas do limite de resistência do '+drone.name);
    else if(gust>drone.maxWind*0.5) warns.push('Rajadas podem comprometer a estabilidade, especialmente em drones leves');
    if(temp<drone.minTemp) issues.push('Temperatura baixa demais ('+temp+'°C)');
    if(temp>drone.maxTemp) issues.push('Temperatura alta demais ('+temp+'°C)');
    if(rain>drone.maxRain && drone.maxRain===0) issues.push('Precipitação detectada ('+rain.toFixed(1)+' mm/h) — drone sem proteção IP');
    else if(rain>2 && drone.maxRain>0) issues.push('Chuva intensa ('+rain.toFixed(1)+' mm/h) — acima do recomendado mesmo com IP55');
    else if(rain>0 && drone.maxRain>0) warns.push('Precipitação leve ('+rain.toFixed(1)+' mm/h) — monitorar (IP55)');
    if(vis<1000) issues.push('Visibilidade muito baixa (<1km)');
    else if(vis<3000) warns.push('Visibilidade reduzida');
    if(cloud>90) warns.push('Cobertura de nuvens muito alta');

    // Índice Kp
    const kp=kpStatus(kpVal);
    if(kpVal!==null&&kpVal>6) issues.push('Tempestade geomagnética severa (Kp '+kpVal.toFixed(1)+') — GPS comprometido');
    else if(kpVal!==null&&kpVal>4) warns.push('Atividade geomagnética elevada (Kp '+kpVal.toFixed(1)+') — monitorar GPS');

    let statusClass, statusText, advice;

      advice='Todas as condições estão dentro dos parâmetros do '+drone.name+'. Bom voo!';
    } else if(issues.length===0){

    } else {
      statusLabel='NÃO VOAR'; statusClass='status-bad'; statusText='Condições inadequadas';
      advice='Problemas: '+issues.join('; ')+'. Não recomendado voar o '+drone.name+' nestas condições.';
    }

    const windPct=Math.min(100,wind/drone.maxWind*100);
    const windColor=wind>drone.maxWind?'#ff4444':wind>drone.maxWind*.8?'#ffaa00':'#00e676';
    const tempOk=temp>=drone.minTemp&&temp<=drone.maxTemp;
    const visColor=vis<1000?'#ff4444':vis<3000?'#ffaa00':'#00e676';
    const rainColor=rain>0?'#ff4444':'#00e676';
    const locLabel=coords.name||(locMode==='gps'?coords.lat.toFixed(3)+'°, '+coords.lon.toFixed(3)+'°':document.getElementById('cityInput').value);
    const [dy,dm,dd]=selectedDate.split('-');
    const diaSemana=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][new Date(selectedDate+'T12:00:00').getDay()];
    const dateLabel=isFuture?`Previsão ${diaSemana} ${dd}/${dm}`:'Agora';

    function wCode(code){
      if(code===0)return'Céu limpo';if(code<=2)return'Parc. nublado';if(code<=3)return'Nublado';
      if(code<=49)return'Névoa';if(code<=59)return'Garoa';if(code<=69)return'Chuva';
      if(code<=79)return'Neve';if(code<=82)return'Chuva forte';return'Tempestade';
    }
    function compass(deg){
      const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(deg/22.5)%16];
    }

    res.innerHTML=`
<div class="result-card">
  <div class="result-header">
    <div class="status-badge ${statusClass}">
      <div class="status-dot"></div>
      <div>
        <div class="status-text" style="font-size:16px;font-weight:700;letter-spacing:1px">${statusLabel}</div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--mono);font-weight:400;margin-top:2px">${drone.name}</div>
      </div>
    </div>

  </div>
  <div class="metrics">

      <div class="metric-bar"><div class="metric-fill" style="width:${Math.min(100,gust/drone.maxWind*100).toFixed(0)}%;background:${gust>drone.maxWind?'#ff4444':'#ffaa00'}"></div></div>

let airMap=null, userMarker=null, mapLat=null, mapLon=null;
let layersVisible={airports:true,flights:true,restricted:true};
let airportMarkers=[], flightMarkers=[], restrictedLayers=[];
let flightRefreshTimer=null;

function toggleLayer(l){
  layersVisible[l]=!layersVisible[l];
  document.getElementById('layer'+l.charAt(0).toUpperCase()+l.slice(1))
    .className='map-btn'+(layersVisible[l]?' active':'');
  if(l==='airports') airportMarkers.forEach(m=>layersVisible.airports?m.addTo(airMap):airMap.removeLayer(m));
  if(l==='flights') flightMarkers.forEach(m=>layersVisible.flights?m.addTo(airMap):airMap.removeLayer(m));
  if(l==='restricted') restrictedLayers.forEach(m=>layersVisible.restricted?m.addTo(airMap):airMap.removeLayer(m));
}

function setMapStatus(txt){ document.getElementById('mapStatus').textContent=txt; }

async function initAirMap(){
  const btn=document.getElementById('mapLocBtn');
  setMapStatus('Obtendo localização...');
  btn.disabled=true;

  // Resolver coordenadas (reusa coords da aba clima se disponível)
  if(coords){ mapLat=coords.lat; mapLon=coords.lon; buildMap(); return; }

  if(!navigator.geolocation){ setMapStatus('GPS não suportado. Use a aba Clima para definir localização primeiro.'); btn.disabled=false; return; }
  navigator.geolocation.getCurrentPosition(pos=>{
    mapLat=pos.coords.latitude; mapLon=pos.coords.longitude;
    coords={lat:mapLat,lon:mapLon};
    buildMap();
  },()=>{ setMapStatus('Não foi possível obter GPS.'); btn.disabled=false; });
}

function buildMap(){
  document.getElementById('mapLocBtn').style.display='none';
  setMapStatus('Carregando mapa...');

  if(!airMap){
    airMap=L.map('airMap',{zoomControl:true}).setView([mapLat,mapLon],11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OSM',maxZoom:18
    }).addTo(airMap);
  } else {
    airMap.setView([mapLat,mapLon],11);
  }

  // Marcador do usuário
  if(userMarker) airMap.removeLayer(userMarker);
  userMarker=L.circleMarker([mapLat,mapLon],{radius:8,fillColor:'#00d4ff',color:'#fff',weight:2,fillOpacity:1})
    .addTo(airMap).bindPopup('📍 Você está aqui');

  setMapStatus('Buscando aeroportos, voos e zonas restritas...');
  Promise.all([loadAirports(),loadFlights(),loadRestricted()])
    .then(()=>setMapStatus(''))
    .catch(()=>setMapStatus('Alguns dados não carregaram. Tente novamente.'));

  // Atualizar voos a cada 30s
  clearInterval(flightRefreshTimer);
  flightRefreshTimer=setInterval(loadFlights,30000);
}

// ── Aeroportos e Helipads via Overpass ────────────────────────
async function loadAirports(){
  airportMarkers.forEach(m=>airMap.removeLayer(m)); airportMarkers=[];
  const r=50000; // 50km
  const query=`[out:json][timeout:25];
(
  node["aeroway"="aerodrome"](around:${r},${mapLat},${mapLon});
  node["aeroway"="helipad"](around:${r},${mapLat},${mapLon});
  way["aeroway"="aerodrome"](around:${r},${mapLat},${mapLon});
);
out center;`;
  try{
    const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(query)});
    const d=await res.json();
    const list=[]; 
    d.elements.forEach(el=>{
      const lat=el.lat||el.center?.lat; const lon=el.lon||el.center?.lon;
      if(!lat||!lon) return;
      const isHelipad=el.tags?.aeroway==='helipad';
      const name=el.tags?.name||el.tags?.ref||(isHelipad?'Helipad':'Aeródromo');
      const icao=el.tags?.icao||el.tags?.iata||'';
      const color=isHelipad?'#ff9900':'#00d4ff';
      const icon=L.divIcon({html:`<div style="width:18px;height:18px;border-radius:50%;background:${color};border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:9px">${isHelipad?'H':'✈'}</div>`,iconSize:[18,18],iconAnchor:[9,9],className:''});
      const m=L.marker([lat,lon],{icon})
        .bindPopup(`<b>${isHelipad?'🚁':'✈️'} ${name}</b>${icao?'<br>ICAO: '+icao:''}<br><span style="color:#888;font-size:11px">Raio restrito para drones: 5km</span>`);
      if(layersVisible.airports) m.addTo(airMap);
      airportMarkers.push(m);
      list.push({name,type:isHelipad?'Helipad':'Aeroporto',icao,lat,lon});
    });
    renderAirspaceList(list);
  }catch(e){console.warn('Aeroportos:',e);}
}

// ── Voos ao vivo via OpenSky ──────────────────────────────────
async function loadFlights(){
  flightMarkers.forEach(m=>airMap.removeLayer(m)); flightMarkers=[];
  const d=1.5;
  const url=`https://opensky-network.org/api/states/all?lamin=${mapLat-d}&lomin=${mapLon-d}&lamax=${mapLat+d}&lomax=${mapLon+d}`;
  try{
    const res=await fetch(url);
    if(!res.ok) return;
    const data=await res.json();
    if(!data.states) return;
    data.states.slice(0,60).forEach(s=>{
      const [icao24,,_,_2,_3,lon,lat,alt,,_4,_5,vel,hdg]=s;
      if(!lat||!lon) return;
      const callsign=(s[1]||'').trim()||icao24;
      const altM=alt?Math.round(alt)+'m':'?';
      const velKt=vel?Math.round(vel*1.944)+'kt':'?';
      const angle=hdg||0;
      const icon=L.divIcon({
        html:`<div style="transform:rotate(${angle}deg);font-size:18px;filter:drop-shadow(0 0 2px #000)">✈</div>`,
        iconSize:[20,20],iconAnchor:[10,10],className:''
      });
      const m=L.marker([lat,lon],{icon})
        .bindPopup(`<b>✈️ ${callsign}</b><br>Alt: ${altM} | Vel: ${velKt}<br><span style="color:#888;font-size:10px">ICAO: ${icao24}</span>`);
      if(layersVisible.flights) m.addTo(airMap);
      flightMarkers.push(m);
    });
  }catch(e){console.warn('OpenSky:',e);}
}

// ── Zonas restritas via Overpass ──────────────────────────────
async function loadRestricted(){
  restrictedLayers.forEach(m=>airMap.removeLayer(m)); restrictedLayers=[];
  const r=60000;
  const query=`[out:json][timeout:25];
(
  way["airspace"](around:${r},${mapLat},${mapLon});
  relation["airspace"](around:${r},${mapLat},${mapLon});
  way["aeroway"="restricted"](around:${r},${mapLat},${mapLon});
);
out geom;`;
  try{
    const res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(query)});
    const d=await res.json();
    d.elements.forEach(el=>{
      if(el.type!=='way'||!el.geometry) return;
      const coords2=el.geometry.map(p=>[p.lat,p.lon]);
      const name=el.tags?.name||el.tags?.airspace||'Zona Restrita';
      const cls=el.tags?.airspace_class||el.tags?.class||'';
      const isDanger=(cls==='D'||cls==='P'||cls==='R');
      const color=isDanger?'#ff4444':'#ffaa00';
      const poly=L.polygon(coords2,{color,fillColor:color,fillOpacity:.15,weight:2})
        .bindPopup(`<b>🚫 ${name}</b>${cls?'<br>Classe: '+cls:''}<br><span style="color:#888;font-size:11px">Zona de espaço aéreo controlado</span>`);
      if(layersVisible.restricted) poly.addTo(airMap);
      restrictedLayers.push(poly);
    });
  }catch(e){console.warn('Zonas:',e);}
}

function renderAirspaceList(airports){
  const el=document.getElementById('airspaceList');
  if(!airports.length){el.innerHTML='';return;}
  const nearby=airports.slice(0,8).map(a=>{
    const dist=Math.round(Math.sqrt(Math.pow((a.lat-mapLat)*111,2)+Math.pow((a.lon-mapLon)*111*Math.cos(mapLat*Math.PI/180),2)));
    return`<div class="airspace-row"><span>${a.type==='Helipad'?'🚁':'✈️'} ${a.name}</span><span style="color:${dist<5?'#ff4444':dist<15?'#ffaa00':'#00e676'}">${dist}km</span></div>`;
  }).join('');
  el.innerHTML=`<div class="airspace-info"><strong>Aeroportos e Helipads próximos</strong>${nearby}<div style="font-size:10px;color:var(--muted);margin-top:6px">⚠️ Verifique sempre o SARPAS/DECEA antes de voar</div></div>`;
}
